# NEAT (Neural Attention Fields) - modular pipeline implementation
#
# Faithful port of the original NEAT leaderboard agent
#   autonomousvision/neat -> leaderboard/team_code/neat_agent.py (class MultiTaskAgent)
# with the network + attention-field decoder + PID controller vendored under
#   leaderboard/team_code/neat/  (config.py, architectures/, modules.py).
#
# Behaviour mirrors MultiTaskAgent exactly:
#   - 3 forward RGB cameras (front, left -60deg, right +60deg), 400x300, fov=100,
#     at x=1.3 y=0 z=2.3 (neat_agent.py sensors(), lines 100-129)
#   - each camera center-cropped to 256x256, kept as float32 in [0,255]
#     (scale_and_crop_image, lines 29-41); ImageNet normalization is applied
#     INSIDE the encoder (architectures/encoder.py ImageCNN), never here
#   - transformer encoder over (velocity + 3 camera tokens) -> latent code
#   - iterative attention-field `plan()` samples a grid to locate waypoints and a
#     second grid for the red-light affordance (architectures/__init__.py:89-138)
#   - NEAT PID controller on the predicted future waypoints
#     (architectures/__init__.py:140-219) + agent post-processing (lines 254-259)
#
# The original sensors() also declares two cameras used ONLY for offline
# visualization/dataset dumps and never read during inference:
#   - 'rgb_front' 800x600  and  'bev' 800x800 (top-down)
# They are intentionally omitted here (they are only consumed inside
# MultiTaskAgent.save(), which SAVE_PATH-gates and does not affect control).
#
# Weights (best_encoder.pth / best_decoder.pth) are fetched by
#   leaderboard/team_code/neat/fetch_weights.sh
# into leaderboard/team_code/neat/ (container path /workspace/...).

sensors:
  # --- forward RGB camera (center, yaw 0) ---
  - type: sensor.camera.rgb
    x: 1.3
    y: 0.0
    z: 2.3
    roll: 0.0
    pitch: 0.0
    yaw: 0.0
    width: 400
    height: 300
    fov: 100
    id: rgb

  # --- forward-left RGB camera (yaw -60) ---
  - type: sensor.camera.rgb
    x: 1.3
    y: 0.0
    z: 2.3
    roll: 0.0
    pitch: 0.0
    yaw: -60.0
    width: 400
    height: 300
    fov: 100
    id: rgb_left

  # --- forward-right RGB camera (yaw +60) ---
  - type: sensor.camera.rgb
    x: 1.3
    y: 0.0
    z: 2.3
    roll: 0.0
    pitch: 0.0
    yaw: 60.0
    width: 400
    height: 300
    fov: 100
    id: rgb_right

  - type: sensor.other.imu
    x: 0.0
    y: 0.0
    z: 0.0
    roll: 0.0
    pitch: 0.0
    yaw: 0.0
    sensor_tick: 0.05
    id: imu

  - type: sensor.other.gnss
    x: 0.0
    y: 0.0
    z: 0.0
    roll: 0.0
    pitch: 0.0
    yaw: 0.0
    sensor_tick: 0.01
    id: gps

  - type: sensor.speedometer
    reading_frequency: 20
    id: speed

pipeline:

  # -- Sensor extraction (neat_agent.py tick(), lines 158-168) -----------------
  # cv2 BGR->RGB per camera, matching cv2.cvtColor(..., COLOR_BGR2RGB).

  - module: team_code.pipeline_modules
    class: ExtractCameraRGB
    args:
      sensor_id: rgb
      out_key: rgb_raw
      bgr_to_rgb: true

  - module: team_code.pipeline_modules
    class: ExtractCameraRGB
    args:
      sensor_id: rgb_left
      out_key: rgb_left_raw
      bgr_to_rgb: true

  - module: team_code.pipeline_modules
    class: ExtractCameraRGB
    args:
      sensor_id: rgb_right
      out_key: rgb_right_raw
      bgr_to_rgb: true

  - module: team_code.pipeline_modules
    class: ExtractSpeed
    args:
      sensor_id: speed
      out_key: speed

  - module: team_code.pipeline_modules
    class: ExtractGNSS
    args:
      sensor_id: gps
      out_key: gps_raw
      take: 2

  - module: team_code.pipeline_modules
    class: ExtractCompass
    args:
      sensor_id: imu
      out_key: compass

  # -- Route planning (neat_agent.py tick(), lines 181-193) --------------------
  # RoutePlanner(4.0, 50.0); pos = (gps - mean) * scale; target point in ego frame
  # via theta = compass + pi/2. next_command is produced but (as in the original)
  # is NOT consumed by the network.

  - module: team_code.pipeline_modules
    class: RoutePlannerNextCommand
    args:
      gps_key: gps_raw
      out_pos_key: pos
      out_wp_key: next_waypoint
      out_cmd_key: next_command
      min_distance: 4.0
      max_distance: 50.0
      gps_in_degrees: true

  - module: team_code.pipeline_modules
    class: TargetPointFromNextWaypoint
    args:
      pos_key: pos
      compass_key: compass
      next_waypoint_key: next_waypoint
      out_key: target_point

  # -- Per-camera preprocessing (scale_and_crop_image, lines 29-41) ------------
  # Center-crop to 256x256, CHW, float32 in [0,255] (NO /255, NO ImageNet norm;
  # the encoder normalizes internally).

  - module: team_code.neat.modules
    class: NEATImagePreprocess
    args:
      in_key: rgb_raw
      out_key: rgb_t
      scale: 1
      crop: 256
      device: cuda

  - module: team_code.neat.modules
    class: NEATImagePreprocess
    args:
      in_key: rgb_left_raw
      out_key: rgb_left_t
      scale: 1
      crop: 256
      device: cuda

  - module: team_code.neat.modules
    class: NEATImagePreprocess
    args:
      in_key: rgb_right_raw
      out_key: rgb_right_t
      scale: 1
      crop: 256
      device: cuda

  # -- NEAT network: encoder + iterative attention-field plan ------------------
  # image_keys order = [front, left, right], matching the per-timestep interleave
  # in neat_agent.py:238-243. Emits a zero hold-control for the first seq_len
  # ticks while the frame buffer fills (lines 204-217).

  - module: team_code.neat.modules
    class: NEATModelRunner
    args:
      encoder_checkpoint: /workspace/leaderboard/team_code/neat/best_encoder.pth
      decoder_checkpoint: /workspace/leaderboard/team_code/neat/best_decoder.pth
      image_keys: [rgb_t, rgb_left_t, rgb_right_t]
      speed_key: speed
      target_point_key: target_point
      out_waypoints_key: neat_pred_waypoints
      out_redlight_key: neat_red_light
      out_velocity_key: neat_velocity
      out_target_key: neat_target
      device: cuda

  # -- NEAT PID controller on predicted waypoints ------------------------------
  # Faithful port of AttentionField.control_pid (architectures/__init__.py:140-219)
  # + agent post-processing (lines 254-259). Params = neat/config.py GlobalConfig.
  # seq_len=1 slices pred_waypoint_mean[:, 1:] -> the 4 predicted future waypoints.

  - module: team_code.neat.modules
    class: NEATControlPID
    args:
      waypoints_key: neat_pred_waypoints
      velocity_key: neat_velocity
      target_key: neat_target
      redlight_key: neat_red_light
      out_key: control
      seq_len: 1
      aim_dist: 4.0
      angle_thresh: 0.3
      dist_thresh: 10.0
      red_light_mult: 0.0
      brake_speed: 0.4
      brake_ratio: 1.1
      clip_delta: 0.25
      max_throttle: 0.75
      turn_KP: 0.75
      turn_KI: 0.75
      turn_KD: 0.3
      turn_n: 40
      speed_KP: 5.0
      speed_KI: 0.5
      speed_KD: 1.0
      speed_n: 40
