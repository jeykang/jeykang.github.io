# Lenient baseline: catch real errors (syntax + undefined names) across the codebase
# without drowning CI in style nits on legacy/experimental scripts. Tighten per-dir later.
target-version = "py312"
extend-exclude = [
    "archive",
    "planning/alpamayo/alpamayo1.5",
    "**/*venv*",
    "**/site-packages",
]

[lint]
select = ["E9", "F63", "F7", "F82"]  # E9 syntax, F63/F7/F82 undefined/misuse — real bugs
