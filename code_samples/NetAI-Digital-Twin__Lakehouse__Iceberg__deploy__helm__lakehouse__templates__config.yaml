apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-config
  labels: {{- include "lakehouse.labels" . | nindent 4 }}
data:
  POLARIS_URI: {{ .Values.config.polarisUri | quote }}
  POLARIS_CATALOG_NAME: {{ .Values.config.polarisCatalogName | quote }}
  POLARIS_SCOPE: {{ .Values.config.polarisScope | quote }}
  POLARIS_REALM: {{ .Values.polaris.realm | quote }}
  POLARIS_PG_DB: {{ .Values.postgres.db | quote }}
  AWS_S3_ENDPOINT: {{ .Values.config.awsS3Endpoint | quote }}
  AWS_REGION: {{ .Values.config.awsRegion | quote }}
  S3_BUCKET: {{ .Values.config.s3Bucket | quote }}
  SPARK_CATALOG_NAME: {{ .Values.config.sparkCatalogName | quote }}
  SPARK_DRIVER_MEMORY: {{ .Values.config.sparkDriverMemory | quote }}
  NVIDIA_SOURCE_PATH: {{ .Values.config.nvidiaSourcePath | quote }}
  NVIDIA_NS_BRONZE: {{ .Values.config.nvidiaNsBronze | quote }}
  NVIDIA_NS_SILVER: {{ .Values.config.nvidiaNsSilver | quote }}
  NVIDIA_NS_GOLD: {{ .Values.config.nvidiaNsGold | quote }}
  NVIDIA_LIDAR_MODE: {{ .Values.config.nvidiaLidarMode | quote }}
  NVIDIA_SILVER_MODE: {{ .Values.config.nvidiaSilverMode | quote }}
  NVIDIA_GOLD_MODE: {{ .Values.config.nvidiaGoldMode | quote }}
{{- if not .Values.secrets.existingSecret }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-secrets
  labels: {{- include "lakehouse.labels" . | nindent 4 }}
type: Opaque
stringData:
  POLARIS_CREDENTIAL: {{ .Values.secrets.polarisCredential | quote }}
  AWS_ACCESS_KEY_ID: {{ .Values.secrets.awsAccessKeyId | quote }}
  AWS_SECRET_ACCESS_KEY: {{ .Values.secrets.awsSecretAccessKey | quote }}
  POLARIS_PG_USER: {{ .Values.secrets.postgresUser | quote }}
  POLARIS_PG_PASSWORD: {{ .Values.secrets.postgresPassword | quote }}
  MINIO_ROOT_USER: {{ .Values.secrets.minioRootUser | quote }}
  MINIO_ROOT_PASSWORD: {{ .Values.secrets.minioRootPassword | quote }}
  POLARIS_ROOT_CLIENT_ID: {{ .Values.secrets.polarisRootClientId | quote }}
  POLARIS_ROOT_CLIENT_SECRET: {{ .Values.secrets.polarisRootClientSecret | quote }}
{{- end }}
