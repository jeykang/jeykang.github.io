# Production overlay (example) — copy + adjust for the storage cluster, then:
#   helm upgrade --install lakehouse deploy/helm/lakehouse -n lakehouse -f values-prod.yaml
# Never commit real credentials — use secrets.existingSecret (created out-of-band).
global:
  storageClass: ""                 # set to the cluster's storage class

config:
  # In-cluster DNS (svc.<namespace>.svc.cluster.local), or an external S3/Ceph endpoint.
  polarisUri: "http://polaris.lakehouse.svc.cluster.local:8181/api/catalog"
  awsS3Endpoint: "http://minio.lakehouse.svc.cluster.local:9000"
  s3Bucket: "warehouse"
  # Ingestion source under the raw-data mount (register-in-place -> keep stable):
  nvidiaSourcePath: "/data/raw/nvidia-physicalai-av-subset"

secrets:
  # Create it first:  kubectl create secret generic lakehouse-secrets \
  #   --from-literal=POLARIS_CREDENTIAL=... --from-literal=AWS_ACCESS_KEY_ID=... (etc, see .env.example [SECRET] rows)
  existingSecret: "lakehouse-secrets"

rawData:
  # The cluster admin binds this PVC to the storage-cluster upload location where the
  # SSD batches land. Deploy can happen before this exists; ingestion just needs it at run time.
  existingClaim: "lakehouse-rawdata"
  mountPath: "/data/raw"

spark:
  image: "ghcr.io/OWNER/lakehouse-spark:TAG"   # built + pushed by CI (deploy/docker/Dockerfile.spark)
