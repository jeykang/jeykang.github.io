# InterFuser — modular pipeline implementation
#
# Replaces the legacy agent_config delegation with an explicit step-by-step
# pipeline. Behaviour is identical to the original InterfuserAgent:
#   - 7-sensor suite (3 RGB + LiDAR + IMU + GNSS + speedometer)
#   - LiDAR histogram reused every 2 steps (always recomputed in first 4 steps)
#   - Traffic-meta tracker updated every 2 steps with EMA (momentum=0)
#   - InterfuserController with full collision-avoidance and red-light logic
#
# To revert to legacy mode, delete the `pipeline:` block and restore:
#   agent_config:
#     agent_file:  /workspace/leaderboard/team_code/interfuser/interfuser_agent.py
#     agent_class: InterfuserAgent
#     config_path: /workspace/leaderboard/team_code/interfuser/interfuser_config.py

sensors:
  - type: sensor.camera.rgb
    x: 1.3
    y: 0.0
    z: 2.3
    roll: 0.0
    pitch: 0.0
    yaw: 0.0
    width: 800
    height: 600
    fov: 100
    id: rgb

  - type: sensor.camera.rgb
    x: 1.3
    y: 0.0
    z: 2.3
    roll: 0.0
    pitch: 0.0
    yaw: -60.0
    width: 400
    height: 300
    fov: 100
    id: rgb_left

  - type: sensor.camera.rgb
    x: 1.3
    y: 0.0
    z: 2.3
    roll: 0.0
    pitch: 0.0
    yaw: 60.0
    width: 400
    height: 300
    fov: 100
    id: rgb_right

  - type: sensor.lidar.ray_cast
    x: 1.3
    y: 0.0
    z: 2.5
    roll: 0.0
    pitch: 0.0
    yaw: -90.0
    id: lidar

  - type: sensor.other.imu
    x: 0.0
    y: 0.0
    z: 0.0
    roll: 0.0
    pitch: 0.0
    yaw: 0.0
    sensor_tick: 0.05
    id: imu

  - type: sensor.other.gnss
    x: 0.0
    y: 0.0
    z: 0.0
    roll: 0.0
    pitch: 0.0
    yaw: 0.0
    sensor_tick: 0.01
    id: gps

  - type: sensor.speedometer
    reading_frequency: 20
    id: speed

pipeline:

  # ── Sensor extraction ──────────────────────────────────────────────────────

  - module: team_code.pipeline_modules
    class: ExtractCameraRGB
    args:
      sensor_id: rgb
      out_key: rgb_raw
      bgr_to_rgb: true

  - module: team_code.pipeline_modules
    class: ExtractCameraRGB
    args:
      sensor_id: rgb_left
      out_key: rgb_left_raw
      bgr_to_rgb: true

  - module: team_code.pipeline_modules
    class: ExtractCameraRGB
    args:
      sensor_id: rgb_right
      out_key: rgb_right_raw
      bgr_to_rgb: true

  - module: team_code.pipeline_modules
    class: ExtractSpeed
    args:
      sensor_id: speed
      out_key: speed

  - module: team_code.pipeline_modules
    class: ExtractGNSS
    args:
      sensor_id: gps
      out_key: gps_raw
      take: 2

  - module: team_code.pipeline_modules
    class: ExtractCompass
    args:
      sensor_id: imu
      out_key: compass

  - module: team_code.pipeline_modules
    class: ExtractLidarXYZ
    args:
      sensor_id: lidar
      out_key: lidar_xyz
      flip_y: true

  # ── Route planning ─────────────────────────────────────────────────────────

  - module: team_code.pipeline_modules
    class: RoutePlannerNextCommand
    args:
      gps_key: gps_raw
      out_pos_key: pos
      out_wp_key: next_waypoint
      out_cmd_key: next_command
      min_distance: 4.0
      max_distance: 50.0
      gps_in_degrees: true

  - module: team_code.pipeline_modules
    class: TargetPointFromNextWaypoint
    args:
      pos_key: pos
      compass_key: compass
      next_waypoint_key: next_waypoint
      out_key: target_point

  # ── LiDAR histogram ────────────────────────────────────────────────────────
  # Reuses the previous result on odd steps; always recomputes during warmup.

  - module: team_code.pipeline_modules
    class: LidarHistogramFromXYZ
    args:
      lidar_xyz_key: lidar_xyz
      compass_key: compass
      pos_key: pos
      out_key: lidar_hist
      crop: 224
      reuse_every_n: 2
      warmup_reuse_steps: 4

  # ── Image transforms ───────────────────────────────────────────────────────
  # Matches create_carla_rgb_transform() in the original agent:
  #   size 224 → resize (341w×256h) then center-crop 224
  #   size 128 → resize (195w×146h) then center-crop 128
  #   center (no scale) → center-crop 128, no resize

  - module: team_code.pipeline_modules
    class: ImageHWCToTorchCHW
    args:
      in_key: rgb_raw
      out_key: rgb_t
      resize_wh: [341, 256]
      center_crop: 224
      mean: [0.485, 0.456, 0.406]
      std:  [0.229, 0.224, 0.225]
      device: cuda
      add_batch_dim: true

  - module: team_code.pipeline_modules
    class: ImageHWCToTorchCHW
    args:
      in_key: rgb_left_raw
      out_key: rgb_left_t
      resize_wh: [195, 146]
      center_crop: 128
      mean: [0.485, 0.456, 0.406]
      std:  [0.229, 0.224, 0.225]
      device: cuda
      add_batch_dim: true

  - module: team_code.pipeline_modules
    class: ImageHWCToTorchCHW
    args:
      in_key: rgb_right_raw
      out_key: rgb_right_t
      resize_wh: [195, 146]
      center_crop: 128
      mean: [0.485, 0.456, 0.406]
      std:  [0.229, 0.224, 0.225]
      device: cuda
      add_batch_dim: true

  # rgb_center: same front image, no resize, crop to 128 (need_scale=False)
  - module: team_code.pipeline_modules
    class: ImageHWCToTorchCHW
    args:
      in_key: rgb_raw
      out_key: rgb_center_t
      resize_wh: null
      center_crop: 128
      mean: [0.485, 0.456, 0.406]
      std:  [0.229, 0.224, 0.225]
      device: cuda
      add_batch_dim: true

  # ── Measurements assembly ──────────────────────────────────────────────────
  # [cmd_one_hot(6), speed(1)] → float32 tensor (1, 7)

  - module: team_code.pipeline_modules
    class: CommandOneHotFromNextCommand
    args:
      cmd_key: next_command
      out_key: cmd_one_hot
      num_cmds: 6
      one_based: true

  - module: team_code.pipeline_modules
    class: AssembleVector
    args:
      keys: [cmd_one_hot, speed]
      out_key: measurements

  - module: team_code.pipeline_modules
    class: NumpyToTorch
    args:
      in_key: measurements
      out_key: measurements_t
      dtype: float32
      add_batch_dim: true
      device: cuda

  - module: team_code.pipeline_modules
    class: NumpyToTorch
    args:
      in_key: target_point
      out_key: target_point_t
      dtype: float32
      add_batch_dim: true
      device: cuda

  - module: team_code.pipeline_modules
    class: NumpyToTorch
    args:
      in_key: lidar_hist
      out_key: lidar_t
      dtype: float32
      add_batch_dim: true
      device: cuda

  # ── Model inference ────────────────────────────────────────────────────────

  - module: team_code.pipeline_modules
    class: TorchModelRunner
    args:
      model:
        module: team_code.interfuser.interfuser.timm.models.interfuser
        class_name: interfuser_baseline
        args: {}
      checkpoint_path: /workspace/leaderboard/team_code/interfuser/interfuser.pth.tar
      checkpoint_state_dict_key: state_dict
      device: cuda
      eval_mode: true
      strict: false
      no_grad: true
      inputs:
        rgb: rgb_t
        rgb_left: rgb_left_t
        rgb_right: rgb_right_t
        rgb_center: rgb_center_t
        measurements: measurements_t
        target_point: target_point_t
        lidar: lidar_t
      output_key: model_output

  # ── Output unpacking ───────────────────────────────────────────────────────
  # Unpack 6-tuple; apply softmax to the three classification heads.

  - module: team_code.pipeline_modules
    class: InterfuserOutputUnpack
    args:
      model_output_key: model_output
      traffic_meta_key: traffic_meta_raw
      pred_waypoints_key: pred_waypoints
      is_junction_key: is_junction
      traffic_light_key: traffic_light_state
      stop_sign_key: stop_sign

  # ── Traffic-meta tracker + EMA ─────────────────────────────────────────────
  # Updates tracker and EMA on even steps and during the first 4 steps.
  # momentum=0 matches interfuser_config.py default (no smoothing across steps).

  - module: team_code.pipeline_modules
    class: TrafficMetaTracker
    args:
      traffic_meta_key: traffic_meta_raw
      gps_key: pos
      compass_key: compass
      out_key: traffic_meta
      momentum: 0.0
      update_every_n: 2
      warmup_always_update: 4

  # ── Control ────────────────────────────────────────────────────────────────
  # InterfuserController with collision-avoidance, red-light, and stop-sign logic.
  # All values match interfuser_config.py GlobalConfig defaults.

  - module: team_code.pipeline_modules
    class: InterfuserControllerModule
    args:
      speed_key: speed
      waypoints_key: pred_waypoints
      junction_key: is_junction
      traffic_light_key: traffic_light_state
      stop_sign_key: stop_sign
      traffic_meta_key: traffic_meta
      out_key: control
      turn_KP: 1.25
      turn_KI: 0.75
      turn_KD: 0.3
      turn_n: 40
      speed_KP: 5.0
      speed_KI: 0.5
      speed_KD: 1.0
      speed_n: 40
      max_throttle: 0.75
      brake_speed: 0.1
      brake_ratio: 1.1
      clip_delta: 0.35
      max_speed: 5.0
      collision_buffer: [2.5, 1.2]
      detect_threshold: 0.04
